<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jujube Notes</title>
    <meta
      name="description"
      content="一个用来发布画、文字和照片的个人艺术博客。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&family=Noto+Serif+SC:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="profile">
          <p class="site-mark">Jujube Notes</p>
          <h1>写字、画画，记录一些慢慢留下来的东西。</h1>
        </div>

        <section class="panel">
          <nav class="category-nav" aria-label="文章分类">
            <a href="#paintings">画</a>
            <span class="nav-star">★</span>
            <a href="#cats">猫</a>
            <span class="nav-star">★</span>
            <a href="#essays">随笔</a>
            <span class="nav-star">★</span>
            <a href="#daily-notes">日常片段</a>
          </nav>
        </section>
      </aside>

      <main class="main-content">
        <section class="banner">
          <div class="banner-copy">
            <p class="page-kicker">Top Image</p>
            <h2>以后这里放你最喜欢的一张画。</h2>
          </div>
          <figure class="banner-art">
            <img
              src="images/home-banner.jpg"
              alt="首页图"
            />
          </figure>
        </section>

        <section id="paintings" class="post-group">
          <div class="group-heading">
            <h2>画</h2>
            <span>Gallery</span>
          </div>
          <div class="article-grid gallery-grid">
            <figure class="gallery-card">
              <img src="images/heihei-and-orange.png" alt="黑黑和小橘" />
              <figcaption>黑黑和小橘</figcaption>
            </figure>
            <figure class="gallery-card">
              <img src="images/heihei-rainy-night.png" alt="雨夜中的小黑黑" />
              <figcaption>雨夜中的小黑黑</figcaption>
            </figure>
            <figure class="gallery-card">
              <img src="images/heihei-purple-blanket.png" alt="盖着紫色毯子的黑黑" />
              <figcaption>盖着紫色毯子的黑黑</figcaption>
            </figure>
            <figure class="gallery-card">
              <img src="images/heihei-first-photo.png" alt="我给黑黑拍的第一张照片" />
              <figcaption>第一张照片</figcaption>
            </figure>
            <figure class="gallery-card">
              <img src="images/heihei-poop.png" alt="黑黑拉臭臭" />
              <figcaption>黑黑拉臭臭</figcaption>
            </figure>
          </div>
        </section>

        <section id="cats" class="post-group">
          <div class="group-heading">
            <h2>猫</h2>
            <span>Articles</span>
          </div>
          <div class="article-grid">
            <article class="article-card">
              <a href="posts/heihei-first-meeting.html" class="card-link">
                <div class="article-thumb thumb-e"></div>
                <h3>黑黑的故事：初次见面</h3>
                <p class="post-meta">2026.07.09</p>
              </a>
            </article>
          </div>
        </section>

        <section id="essays" class="post-group">
          <div class="group-heading">
            <h2>随笔</h2>
            <span>Articles</span>
          </div>
          <div class="article-grid">
            <article class="article-card">
              <a href="posts/a-place-to-keep.html" class="card-link">
                <div class="article-thumb thumb-c"></div>
                <h3>想有一个不被时间线推着走的地方</h3>
                <p class="post-meta">2026.06.18</p>
              </a>
            </article>
          </div>
        </section>

        <section id="daily-notes" class="post-group">
          <div class="group-heading">
            <h2>日常片段</h2>
            <span>Articles</span>
          </div>
          <div class="article-grid">
            <article class="article-card article-card-wide">
              <a href="posts/four-pm-light.html" class="card-link">
                <div class="article-thumb thumb-d"></div>
                <h3>下午四点的光落在桌子边缘</h3>
                <p class="post-meta">2026.05.22</p>
              </a>
            </article>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
